<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenClaw Startup Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root { --bg:#0b1020; --panel:#121a31; --panel-2:#182240; --line:rgba(255,255,255,.08); --text:#eef2ff; --muted:#aab4d6; --accent:#7cc4ff; --accent2:#7ef0c8; --warn:#ffd37c; --danger:#ff8f8f; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter,system-ui,sans-serif; background:linear-gradient(180deg,#0b1020 0%,#0d1327 100%); color:var(--text); }
    .login,.app { min-height:100vh; }
    .login { display:grid; place-items:center; padding:24px; }
    .login-card,.card { background:var(--panel); border:1px solid var(--line); border-radius:18px; box-shadow:0 20px 60px rgba(0,0,0,.35); }
    .login-card { width:100%; max-width:420px; padding:24px; }
    h1,h2,h3,p { margin-top:0; } .muted{color:var(--muted);} .small{font-size:.9rem;} .warn{color:var(--warn);} .danger{color:var(--danger);} strong{color:#fff;}
    input,button{width:100%;border-radius:12px;border:1px solid var(--line);padding:12px 14px;font:inherit;} input{background:#0f1730;color:var(--text);margin-top:10px;} button{margin-top:14px;background:var(--accent);color:#08101d;font-weight:700;cursor:pointer;} .error{color:var(--danger);margin-top:10px;}
    .app{display:none;} .topbar{position:sticky;top:0;z-index:10;background:rgba(11,16,32,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);} .topbar-inner{max-width:1320px;margin:0 auto;padding:16px 20px;display:flex;gap:16px;align-items:center;justify-content:space-between;flex-wrap:wrap;}
    .container{max-width:1320px;margin:0 auto;padding:24px 20px 60px;} .tabs{display:flex;gap:10px;flex-wrap:wrap;} .tab{padding:10px 14px;border-radius:999px;background:var(--panel-2);color:var(--muted);border:1px solid var(--line);cursor:pointer;} .tab.active{color:var(--text);background:#22315a;}
    .grid{display:grid;gap:16px;grid-template-columns:repeat(12,1fr);} .card{padding:18px;grid-column:span 12;} .hero{grid-column:span 12;} .kpi{grid-column:span 3;} .kpi-value{font-size:2.15rem;font-weight:800;margin-bottom:6px;} .chart-big{grid-column:span 12;} .chart-half{grid-column:span 6;} .side{grid-column:span 4;} .wide{grid-column:span 8;}
    .list{display:grid;gap:10px;} .list-item{padding:12px;border-radius:12px;background:var(--panel-2);border:1px solid var(--line);} .pill{display:inline-block;font-size:.82rem;font-weight:700;padding:4px 8px;border-radius:999px;background:rgba(126,240,200,.12);color:var(--accent2);} canvas{width:100%!important;height:360px!important;}
    @media (max-width: 980px){ .kpi,.chart-half,.side,.wide,.chart-big,.hero{grid-column:span 12;} }
  </style>
</head>
<body>
  <section class="login" id="loginView"><div class="login-card"><h1>Startup Dashboard</h1><p class="muted">Accesso protetto leggero. Utile come barriera minima, non come sicurezza forte.</p><input type="password" id="passwordInput" placeholder="Password" /><button id="loginBtn">Entra</button><div class="error" id="loginError"></div></div></section>
  <section class="app" id="appView"><div class="topbar"><div class="topbar-inner"><div><h2 style="margin:0;">OpenClaw Startup Dashboard</h2><div class="muted small">Dashboard multi-startup con lettura orientata a crescita, chiarezza e decisioni da founder.</div></div><div class="tabs" id="tabs"></div></div></div><div class="container"><div class="grid" id="dashboard"></div></div></section>
  <script>
    const PASSWORD_HASH='ba7d4ed4d7f0291976ebdc2f5329d6e0af4b9be14b8cc306dfb67c485fece067';
    const STARTUPS=['mecci','sprinklermap','safemappy'];
    const DATA_BASE='./data';
    const state={current:'mecci',data:{}};
    let charts=[];
    async function sha256(text){const data=new TextEncoder().encode(text);const hash=await crypto.subtle.digest('SHA-256',data);return [...new Uint8Array(hash)].map(b=>b.toString(16).padStart(2,'0')).join('');}
    document.getElementById('loginBtn').addEventListener('click', async()=>{const value=document.getElementById('passwordInput').value; const hash=await sha256(value); if(hash===PASSWORD_HASH){localStorage.setItem('openclaw_dashboard_auth','ok'); boot();} else {document.getElementById('loginError').textContent='Password errata';}});
    async function loadStartup(startup){const res=await fetch(`${DATA_BASE}/${startup}.json`, {cache:'no-store'}); if(!res.ok) throw new Error('load failed'); state.data[startup]=await res.json();}
    function val(obj, path){try{return path.split('.').reduce((acc,key)=>acc?.[key],obj) ?? null;}catch{return null;}}
    function series(rows,path){return rows.map(r=>val(r,path));}
    function pctDelta(rows,path,days){if(rows.length<=days) return null; const latest=val(rows[rows.length-1],path); const prev=val(rows[rows.length-1-days],path); if(latest==null||prev==null||prev===0) return null; return ((latest-prev)/prev)*100;}
    function pgReading(startup, rows){const latest=rows[rows.length-1]||{}; if(startup==='mecci'){return { status:'Mecci oggi non mostra ancora crescita convincente di uso core.', bottleneck:'Il collo di bottiglia sembra l’attivazione/uso reale, non il numero di paganti storico.', action:'La priorità founder è aumentare il comportamento ripetuto che conta: creazione tornei, partecipazione e ritorno utenti.', principle:'Principio PG: startup = growth. Se il core usage non cresce, il resto è secondario.'}; } return { status:`${startup} non ha ancora dati disponibili o integrati.`, bottleneck:'Serve pipeline dati prima di fare letture serie.', action:'Completa l’export metrics con schema coerente.', principle:'Principio PG: misura prima la verità d’uso, poi decidi.'}; }
    function destroyCharts(){charts.forEach(c=>c.destroy()); charts=[];}
    function addChart(id,type,data,options){const ctx=document.getElementById(id); const c=new Chart(ctx,{type,data,options}); charts.push(c);}
    function render(){destroyCharts(); const payload=state.data[state.current]||{snapshots:[]}; const rows=payload.snapshots||[]; const latest=payload.latest||{}; const reading=pgReading(state.current,rows); const dashboard=document.getElementById('dashboard'); const kpis = state.current==='mecci' ? [ ['DAU', val(latest,'engagement.dau')], ['WAU', val(latest,'engagement.wau')], ['MAU', val(latest,'engagement.mau')], ['Paying Users', val(latest,'revenue.paying_users')], ['Δ MAU 7g', pctDelta(rows,'engagement.mau',7)], ['Δ MAU 30g', pctDelta(rows,'engagement.mau',30)] ] : [ ['Snapshot', latest.snapshot_date], ['Count', payload.count], ['Granularity', val(latest,'period.granularity')], ['Status', 'n/d'] ];
      dashboard.innerHTML = `
        <div class="card hero">
          <h2 style="margin-bottom:8px;">${state.current.toUpperCase()}</h2>
          <p class="muted">${reading.principle}</p>
          <div class="list">
            <div class="list-item"><strong>Stato:</strong> ${reading.status}</div>
            <div class="list-item"><strong>Collo di bottiglia:</strong> ${reading.bottleneck}</div>
            <div class="list-item"><strong>Priorità suggerita:</strong> ${reading.action}</div>
          </div>
        </div>
        ${kpis.map(([label,value])=>`<div class="card kpi"><div class="muted small">${label}</div><div class="kpi-value">${typeof value==='number' && label.startsWith('Δ') ? value.toFixed(1)+'%' : (value ?? 'n/d')}</div></div>`).join('')}
        <div class="card chart-big"><h3>Trend principale</h3><canvas id="mainChart"></canvas></div>
        <div class="card chart-half"><h3>Attività utenti</h3><canvas id="userChart"></canvas></div>
        <div class="card chart-half"><h3>Core actions</h3><canvas id="coreChart"></canvas></div>
        <div class="card wide"><h3>Legenda metriche</h3><div class="list"><div class="list-item small"><strong>DAU</strong> = Daily Active Users, utenti attivi nel giorno dello snapshot.</div><div class="list-item small"><strong>WAU</strong> = Weekly Active Users, utenti attivi negli ultimi 7 giorni fino a quella data.</div><div class="list-item small"><strong>MAU</strong> = Monthly Active Users, utenti attivi negli ultimi 30 giorni fino a quella data.</div></div></div>
        <div class="card side"><h3>Stato dati</h3><div class="list"><div class="list-item"><span class="pill">${payload.count||0} snapshot</span></div><div class="list-item small">Ultimo snapshot: ${latest.snapshot_date||'n/d'}</div><div class="list-item small">Granularità: ${val(latest,'period.granularity')||'n/d'}</div><div class="list-item small warn">La protezione attuale resta un gate frontend leggero.</div></div></div>
        <div class="card chart-big"><h3>Note dataset</h3><div class="list">${((latest.notes||[]).slice(0,10)).map(n=>`<div class="list-item small">${n}</div>`).join('') || '<div class="list-item small muted">Nessuna nota disponibile</div>'}</div></div>
      `;
      const labels=rows.map(r=>r.snapshot_date);
      if(state.current==='mecci'){
        addChart('mainChart','line',{labels,datasets:[{label:'MAU',data:series(rows,'engagement.mau'),borderColor:'#7cc4ff',tension:.25},{label:'Paying Users',data:series(rows,'revenue.paying_users'),borderColor:'#ff8f8f',tension:.25}]},chartOptions());
        addChart('userChart','line',{labels,datasets:[{label:'DAU',data:series(rows,'engagement.dau'),borderColor:'#7cc4ff',tension:.25},{label:'WAU',data:series(rows,'engagement.wau'),borderColor:'#7ef0c8',tension:.25},{label:'MAU',data:series(rows,'engagement.mau'),borderColor:'#ffd37c',tension:.25}]},chartOptions());
        addChart('coreChart','bar',{labels,datasets:[{label:'Tournaments Created',data:series(rows,'engagement.tournaments_created'),backgroundColor:'#7ef0c8'},{label:'Participants Joined',data:series(rows,'engagement.participants_joined'),backgroundColor:'#7cc4ff'}]},chartOptions());
      } else {
        addChart('mainChart','line',{labels,datasets:[{label:'Snapshot Count',data:rows.map((_,i)=>i+1),borderColor:'#7cc4ff',tension:.25}]},chartOptions());
        addChart('userChart','line',{labels,datasets:[{label:'DAU',data:series(rows,'engagement.dau'),borderColor:'#7cc4ff',tension:.25}]},chartOptions());
        addChart('coreChart','bar',{labels,datasets:[{label:'No data yet',data:rows.map(()=>0),backgroundColor:'#7ef0c8'}]},chartOptions());
      }
    }
    function chartOptions(){return {responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#eef2ff'}}},scales:{x:{ticks:{color:'#aab4d6'},grid:{color:'rgba(255,255,255,.05)'}},y:{ticks:{color:'#aab4d6'},grid:{color:'rgba(255,255,255,.05)'}}}};}
    function renderTabs(){const el=document.getElementById('tabs'); el.innerHTML=STARTUPS.map(s=>`<button class="tab ${s===state.current?'active':''}" data-startup="${s}">${s}</button>`).join(''); el.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click',()=>{{ state.current=btn.dataset.startup; renderTabs(); render(); }}));}
    async function boot(){const authed=localStorage.getItem('openclaw_dashboard_auth')==='ok'; if(!authed) return; document.getElementById('loginView').style.display='none'; document.getElementById('appView').style.display='block'; await Promise.all(STARTUPS.map(async s=>{{ try {{ await loadStartup(s); }} catch {{ state.data[s]={{snapshots:[],count:0,latest:null}}; }} })); renderTabs(); render();}
    boot();
  </script>
</body>
</html>
