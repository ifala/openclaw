  <style>
    :root { --bg:#0b1020; --panel:#121a31; --panel-2:#182240; --line:rgba(255,255,255,0.08); --text:#eef2ff; --muted:#aab4d6; --accent:#7cc4ff; --accent-2:#7ef0c8; --danger:#ff8f8f; --warning:#ffd37c; }
    * { box-sizing:border-box; } body { margin:0; font-family:Inter,system-ui,sans-serif; background:linear-gradient(180deg,#0b1020 0%,#0d1327 100%); color:var(--text); }
    .login,.app { min-height:100vh; } .login { display:grid; place-items:center; padding:24px; }
    .login-card,.card { background:var(--panel); border:1px solid var(--line); border-radius:18px; box-shadow:0 20px 60px rgba(0,0,0,.35); }
    .login-card { width:100%; max-width:420px; padding:24px; } h1,h2,h3,p { margin-top:0; } .muted { color:var(--muted); }
    input,button { width:100%; border-radius:12px; border:1px solid var(--line); padding:12px 14px; font:inherit; } input { background:#0f1730; color:var(--text); margin-top:10px; }
    button { margin-top:14px; background:var(--accent); color:#08101d; font-weight:700; cursor:pointer; } .error { color:var(--danger); margin-top:10px; } .app { display:none; }
    .topbar { position:sticky; top:0; z-index:10; background:rgba(11,16,32,.92); backdrop-filter:blur(10px); border-bottom:1px solid var(--line); }
    .topbar-inner { max-width:1280px; margin:0 auto; padding:16px 20px; display:flex; gap:16px; align-items:center; justify-content:space-between; flex-wrap:wrap; }
    .container { max-width:1280px; margin:0 auto; padding:24px 20px 60px; } .tabs { display:flex; gap:10px; flex-wrap:wrap; }
    .tab { padding:10px 14px; border-radius:999px; background:var(--panel-2); color:var(--muted); border:1px solid var(--line); cursor:pointer; } .tab.active { color:var(--text); background:#22315a; }
    .grid { display:grid; gap:16px; grid-template-columns:repeat(12,1fr); } .card { padding:18px; grid-column:span 12; } .kpi { grid-column:span 3; }
    .kpi-value { font-size:2rem; font-weight:800; margin-bottom:6px; } .chart-card { grid-column:span 8; } .side-card { grid-column:span 4; }
    .list { display:grid; gap:10px; } .list-item { padding:12px; border-radius:12px; background:var(--panel-2); border:1px solid var(--line); }
    .pill { display:inline-block; font-size:.82rem; font-weight:700; padding:4px 8px; border-radius:999px; background:rgba(126,240,200,.12); color:var(--accent-2); } .warn { color:var(--warning); } .small { font-size:.9rem; }
    canvas { width:100% !important; height:320px !important; } @media (max-width:980px) { .kpi,.chart-card,.side-card { grid-column:span 12; } }
  </style>

    function render() { const rows = state.data[state.current] || []; const labels = rows.map(r => r.snapshot_date); const dashboard = document.getElementById('dashboard'); const latest = rows[rows.length - 1] || {}; const kpis = state.current === 'mecci' ? [['DAU', latest.engagement?.dau], ['WAU', latest.engagement?.wau], ['MAU', latest.engagement?.mau], ['Paying Users', latest.revenue?.paying_users]] : [['DAU', latest.engagement?.dau], ['WAU', latest.engagement?.wau], ['MAU', latest.engagement?.mau], ['Snapshot', latest.snapshot_date]]; dashboard.innerHTML = `${kpis.map(([label, value]) => `<div class="card kpi"><div class="muted small">${label}</div><div class="kpi-value">${value ?? 'n/d'}</div></div>`).join('')}<div class="card chart-card"><h3>${state.current.toUpperCase()} · Trend attività</h3><canvas id="trendChart"></canvas></div><div class="card side-card"><h3>Lettura founder</h3><div class="list">${pgPerspective(state.current, rows).map(x => `<div class="list-item">${x}</div>`).join('')}<div class="list-item small"><strong>DAU</strong> = Daily Active Users, cioè utenti attivi nel giorno dello snapshot.</div><div class="list-item small"><strong>WAU</strong> = Weekly Active Users, cioè utenti attivi negli ultimi 7 giorni fino a quella data.</div><div class="list-item small"><strong>MAU</strong> = Monthly Active Users, cioè utenti attivi negli ultimi 30 giorni fino a quella data.</div></div></div><div class="card chart-card"><h3>Ultime note dataset</h3><div class="list">${((latest.notes || []).slice(0, 8)).map(n => `<div class="list-item small">${n}</div>`).join('') || '<div class="list-item small muted">Nessuna nota disponibile</div>'}</div></div><div class="card side-card"><h3>Stato dati</h3><div class="list"><div class="list-item"><span class="pill">${rows.length} snapshot</span></div><div class="list-item small">Ultimo snapshot: ${latest.snapshot_date || 'n/d'}</div><div class="list-item small">Granularità: ${latest.period?.granularity || 'n/d'}</div><div class="list-item small warn">Protezione attuale: gate leggero frontend, non sicurezza forte.</div></div></div>`; const ctx = document.getElementById('trendChart'); if (chart) chart.destroy(); const datasets = state.current === 'mecci' ? [ { label: 'DAU', data: metricSeries(rows, 'engagement.dau'), borderColor: '#7cc4ff' }, { label: 'Tournaments Created', data: metricSeries(rows, 'engagement.tournaments_created'), borderColor: '#7ef0c8' }, { label: 'Participants Joined', data: metricSeries(rows, 'engagement.participants_joined'), borderColor: '#ffd37c' } ] : [ { label: 'DAU', data: metricSeries(rows, 'engagement.dau'), borderColor: '#7cc4ff' }, { label: 'WAU', data: metricSeries(rows, 'engagement.wau'), borderColor: '#7ef0c8' }, { label: 'MAU', data: metricSeries(rows, 'engagement.mau'), borderColor: '#ffd37c' } ]; chart = new Chart(ctx, { type: 'line', data: { labels, datasets: datasets.map(d => ({ ...d, tension: 0.25, fill: false })) }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#eef2ff' } } }, scales: { x: { ticks: { color: '#aab4d6' }, grid: { color: 'rgba(255,255,255,0.05)' } }, y: { ticks: { color: '#aab4d6' }, grid: { color: 'rgba(255,255,255,0.05)' } } } } }); }
    function renderTabs() { const el=document.getElementById('tabs'); el.innerHTML=STARTUPS.map(s => `<button class="tab ${s===state.current?'active':''}" data-startup="${s}">${s}</button>`).join(''); el.querySelectorAll('.tab').forEach(btn => { btn.addEventListener('click', () => { state.current=btn.dataset.startup; renderTabs(); render(); }); }); }
    function boot() { const authed = localStorage.getItem('openclaw_dashboard_auth') === 'ok'; if (!authed) return; document.getElementById('loginView').style.display='none'; document.getElementById('appView').style.display='block'; renderTabs(); render(); }
    boot();
  </script>
</body>
</html>
